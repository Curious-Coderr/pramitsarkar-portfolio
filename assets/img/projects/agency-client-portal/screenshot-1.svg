<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="'Inter Tight','Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEFBF6"/>
      <stop offset="1" stop-color="#E1F5EE"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0EA5A0"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#042F2E" flood-opacity="0.18"/>
    </filter>
    <clipPath id="win"><rect x="646" y="120" width="486" height="510" rx="22"/></clipPath>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Left content -->
  <text x="80" y="212" fill="#0D9488" font-size="20" font-weight="700" letter-spacing="3">AGENCY MANAGEMENT SYSTEM</text>
  <text x="80" y="278" fill="#0F2E2B" font-size="46" font-weight="700">Run the whole</text>
  <text x="80" y="332" fill="#0F2E2B" font-size="46" font-weight="700">agency from one</text>
  <text x="80" y="386" fill="#0F2E2B" font-size="46" font-weight="700">dashboard</text>
  <text x="80" y="436" fill="#33534E" font-size="21">Clients, content calendar, client approvals,</text>
  <text x="80" y="466" fill="#33534E" font-size="21">invoices, team, vault &amp; AI captions in one app.</text>

  <!-- pills -->
  <g font-size="16" font-weight="600">
    <rect x="80" y="516" width="126" height="42" rx="21" fill="#fff" stroke="#C8ECE3"/>
    <text x="143" y="543" fill="#0D9488" text-anchor="middle">Calendar</text>
    <rect x="216" y="516" width="150" height="42" rx="21" fill="#fff" stroke="#C8ECE3"/>
    <text x="291" y="543" fill="#0D9488" text-anchor="middle">Client Portal</text>
    <rect x="376" y="516" width="112" height="42" rx="21" fill="#fff" stroke="#C8ECE3"/>
    <text x="432" y="543" fill="#0D9488" text-anchor="middle">Invoices</text>
    <rect x="498" y="516" width="86" height="42" rx="21" fill="#fff" stroke="#C8ECE3"/>
    <text x="541" y="543" fill="#0D9488" text-anchor="middle">Vault</text>
  </g>

  <!-- Dashboard window -->
  <g filter="url(#shadow)">
    <rect x="646" y="120" width="486" height="510" rx="22" fill="#ffffff"/>
  </g>
  <g clip-path="url(#win)">
    <!-- sidebar -->
    <rect x="646" y="120" width="96" height="510" fill="url(#side)"/>
    <circle cx="694" cy="162" r="15" fill="#ffffff" opacity="0.95"/>
    <text x="694" y="168" fill="#0D9488" font-size="16" font-weight="800" text-anchor="middle">A</text>
    <g fill="#ffffff" opacity="0.85">
      <rect x="672" y="224" width="44" height="10" rx="5"/>
      <rect x="672" y="262" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="300" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="338" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="376" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="414" width="44" height="10" rx="5" opacity="0.6"/>
    </g>
    <rect x="654" y="214" width="8" height="30" rx="4" fill="#ffffff"/>

    <!-- topbar -->
    <text x="770" y="168" fill="#0F2E2B" font-size="20" font-weight="700">Dashboard</text>
    <circle cx="1096" cy="160" r="16" fill="#E6F7F2"/>

    <!-- stat cards -->
    <g>
      <rect x="770" y="196" width="106" height="78" rx="12" fill="#F3FBF8" stroke="#DCF0EA"/>
      <text x="786" y="228" fill="#7FA69E" font-size="12" font-weight="600">CLIENTS</text>
      <text x="786" y="256" fill="#0D9488" font-size="24" font-weight="800">42</text>
      <rect x="888" y="196" width="106" height="78" rx="12" fill="#F3FBF8" stroke="#DCF0EA"/>
      <text x="904" y="228" fill="#7FA69E" font-size="12" font-weight="600">REVENUE</text>
      <text x="904" y="256" fill="#0D9488" font-size="24" font-weight="800">&#8377;8.4L</text>
      <rect x="1006" y="196" width="106" height="78" rx="12" fill="#F3FBF8" stroke="#DCF0EA"/>
      <text x="1022" y="228" fill="#7FA69E" font-size="12" font-weight="600">APPROVED</text>
      <text x="1022" y="256" fill="#F59E0B" font-size="24" font-weight="800">87%</text>
    </g>

    <!-- calendar card -->
    <rect x="770" y="292" width="342" height="150" rx="12" fill="#FBFEFD" stroke="#DCF0EA"/>
    <text x="788" y="320" fill="#0F2E2B" font-size="15" font-weight="700">Content calendar</text>
    <g>
      <rect x="788" y="336" width="42" height="34" rx="7" fill="#E6F7F2"/>
      <rect x="838" y="336" width="42" height="34" rx="7" fill="url(#acc)"/>
      <rect x="888" y="336" width="42" height="34" rx="7" fill="#E6F7F2"/>
      <rect x="938" y="336" width="42" height="34" rx="7" fill="#FDE9CC"/>
      <rect x="988" y="336" width="42" height="34" rx="7" fill="#E6F7F2"/>
      <rect x="1038" y="336" width="42" height="34" rx="7" fill="#E6F7F2"/>
      <rect x="788" y="378" width="42" height="34" rx="7" fill="#E6F7F2"/>
      <rect x="838" y="378" width="42" height="34" rx="7" fill="#FDE9CC"/>
      <rect x="888" y="378" width="42" height="34" rx="7" fill="url(#acc)"/>
      <rect x="938" y="378" width="42" height="34" rx="7" fill="#E6F7F2"/>
      <rect x="988" y="378" width="42" height="34" rx="7" fill="url(#acc)"/>
      <rect x="1038" y="378" width="42" height="34" rx="7" fill="#E6F7F2"/>
    </g>

    <!-- approval row -->
    <rect x="770" y="456" width="342" height="66" rx="12" fill="#F3FBF8" stroke="#DCF0EA"/>
    <circle cx="800" cy="489" r="15" fill="#D9F2EA"/>
    <text x="800" y="494" fill="#0D9488" font-size="14" font-weight="800" text-anchor="middle">&#10003;</text>
    <text x="828" y="483" fill="#0F2E2B" font-size="14" font-weight="700">Reel approved by client</text>
    <text x="828" y="504" fill="#7FA69E" font-size="12">Acme Co. &#183; Instagram &#183; just now</text>
    <rect x="1032" y="472" width="66" height="34" rx="17" fill="url(#acc)"/>
    <text x="1065" y="494" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Live</text>
  </g>
</svg>
