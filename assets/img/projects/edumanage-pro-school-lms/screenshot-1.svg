<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="'Inter Tight','Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F6FF"/>
      <stop offset="1" stop-color="#EBEDFF"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#1E1B4B" flood-opacity="0.18"/>
    </filter>
    <clipPath id="win"><rect x="646" y="120" width="486" height="510" rx="22"/></clipPath>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Left content -->
  <text x="80" y="212" fill="#4F46E5" font-size="20" font-weight="700" letter-spacing="3">SCHOOL MANAGEMENT + LMS</text>
  <text x="80" y="278" fill="#1E1B33" font-size="46" font-weight="700">Run the entire</text>
  <text x="80" y="332" fill="#1E1B33" font-size="46" font-weight="700">school from one</text>
  <text x="80" y="386" fill="#1E1B33" font-size="46" font-weight="700">dashboard</text>
  <text x="80" y="436" fill="#45435F" font-size="21">Admissions, attendance, fees, exams, payroll</text>
  <text x="80" y="466" fill="#45435F" font-size="21">and a full LMS &#8212; 24+ modules, 6 roles.</text>

  <!-- pills -->
  <g font-size="16" font-weight="600">
    <rect x="80" y="516" width="132" height="42" rx="21" fill="#fff" stroke="#DAD9FB"/>
    <text x="146" y="543" fill="#4F46E5" text-anchor="middle">Admissions</text>
    <rect x="222" y="516" width="120" height="42" rx="21" fill="#fff" stroke="#DAD9FB"/>
    <text x="282" y="543" fill="#4F46E5" text-anchor="middle">Fees &amp; Exams</text>
    <rect x="352" y="516" width="92" height="42" rx="21" fill="#fff" stroke="#DAD9FB"/>
    <text x="398" y="543" fill="#4F46E5" text-anchor="middle">Payroll</text>
    <rect x="454" y="516" width="80" height="42" rx="21" fill="#fff" stroke="#DAD9FB"/>
    <text x="494" y="543" fill="#4F46E5" text-anchor="middle">LMS</text>
  </g>

  <!-- Dashboard window -->
  <g filter="url(#shadow)">
    <rect x="646" y="120" width="486" height="510" rx="22" fill="#ffffff"/>
  </g>
  <g clip-path="url(#win)">
    <!-- sidebar -->
    <rect x="646" y="120" width="96" height="510" fill="url(#side)"/>
    <circle cx="694" cy="162" r="15" fill="#ffffff" opacity="0.95"/>
    <text x="694" y="168" fill="#4F46E5" font-size="16" font-weight="800" text-anchor="middle">E</text>
    <g fill="#ffffff" opacity="0.85">
      <rect x="672" y="224" width="44" height="10" rx="5"/>
      <rect x="672" y="262" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="300" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="338" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="376" width="44" height="10" rx="5" opacity="0.6"/>
      <rect x="672" y="414" width="44" height="10" rx="5" opacity="0.6"/>
    </g>
    <rect x="654" y="214" width="8" height="30" rx="4" fill="#ffffff"/>

    <!-- topbar -->
    <text x="770" y="168" fill="#1E1B33" font-size="20" font-weight="700">Dashboard</text>
    <circle cx="1096" cy="160" r="16" fill="#EEF0FF"/>

    <!-- stat cards -->
    <g>
      <rect x="770" y="196" width="106" height="78" rx="12" fill="#F6F7FF" stroke="#E7E8FD"/>
      <text x="786" y="228" fill="#8A8AB5" font-size="12" font-weight="600">STUDENTS</text>
      <text x="786" y="256" fill="#4F46E5" font-size="24" font-weight="800">1,240</text>
      <rect x="888" y="196" width="106" height="78" rx="12" fill="#F6F7FF" stroke="#E7E8FD"/>
      <text x="904" y="228" fill="#8A8AB5" font-size="12" font-weight="600">FEES DUE</text>
      <text x="904" y="256" fill="#4F46E5" font-size="24" font-weight="800">&#8377;3.2L</text>
      <rect x="1006" y="196" width="106" height="78" rx="12" fill="#F6F7FF" stroke="#E7E8FD"/>
      <text x="1022" y="228" fill="#8A8AB5" font-size="12" font-weight="600">PRESENT</text>
      <text x="1022" y="256" fill="#22A06B" font-size="24" font-weight="800">96%</text>
    </g>

    <!-- chart card -->
    <rect x="770" y="292" width="342" height="230" rx="12" fill="#FBFBFF" stroke="#E7E8FD"/>
    <text x="788" y="322" fill="#1E1B33" font-size="15" font-weight="700">Attendance overview</text>
    <!-- bars -->
    <g>
      <rect x="800" y="420" width="30" height="70" rx="6" fill="url(#barA)"/>
      <rect x="850" y="392" width="30" height="98" rx="6" fill="url(#barA)"/>
      <rect x="900" y="360" width="30" height="130" rx="6" fill="url(#barA)"/>
      <rect x="950" y="404" width="30" height="86" rx="6" fill="url(#barA)"/>
      <rect x="1000" y="376" width="30" height="114" rx="6" fill="url(#barA)"/>
      <rect x="1050" y="344" width="30" height="146" rx="6" fill="#4F46E5"/>
    </g>
    <line x1="790" y1="492" x2="1092" y2="492" stroke="#E7E8FD" stroke-width="2"/>
  </g>
</svg>
