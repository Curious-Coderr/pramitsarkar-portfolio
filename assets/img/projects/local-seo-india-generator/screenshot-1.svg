    <rect x="690" y="352" width="360" height="9" rx="4" fill="#EDE6DC"/>
    <rect x="690" y="368" width="300" height="9" rx="4" fill="#EDE6DC"/>
    <!-- result 3 -->
    <text x="690" y="410" fill="#1A5CC0" font-size="16" font-weight="600">Telegram Members in Kolkata</text>
    <rect x="690" y="420" width="360" height="9" rx="4" fill="#EDE6DC"/>
    <rect x="690" y="436" width="280" height="9" rx="4" fill="#EDE6DC"/>

    <!-- generated page tiles -->
    <text x="672" y="492" fill="#8A7660" font-size="12" font-weight="700" letter-spacing="1">AUTO-GENERATED PAGES</text>
    <g>
      <rect x="672" y="504" width="100" height="52" rx="10" fill="#FDF1E7" stroke="#F3D8BF"/>
      <text x="686" y="528" fill="#B4622A" font-size="12" font-weight="700">Delhi</text>
      <text x="686" y="546" fill="#C9A98C" font-size="10">/ig-followers</text>
      <rect x="784" y="504" width="100" height="52" rx="10" fill="#FDF1E7" stroke="#F3D8BF"/>
      <text x="798" y="528" fill="#B4622A" font-size="12" font-weight="700">Jaipur</text>
      <text x="798" y="546" fill="#C9A98C" font-size="10">/yt-views</text>
      <rect x="896" y="504" width="100" height="52" rx="10" fill="#FDF1E7" stroke="#F3D8BF"/>
      <text x="910" y="528" fill="#B4622A" font-size="12" font-weight="700">Chennai</text>
      <text x="910" y="546" fill="#C9A98C" font-size="10">/tiktok</text>
      <rect x="1008" y="504" width="100" height="52" rx="10" fill="url(#acc)"/>
      <text x="1058" y="536" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">+18k</text>
