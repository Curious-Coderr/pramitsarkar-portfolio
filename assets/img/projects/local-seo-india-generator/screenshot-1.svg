<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="'Inter Tight','Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF6EE"/>
      <stop offset="1" stop-color="#FDEBDD"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#7C2D12" flood-opacity="0.18"/>
    </filter>
    <clipPath id="win"><rect x="646" y="110" width="486" height="530" rx="22"/></clipPath>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Left content -->
  <text x="80" y="200" fill="#EA580C" font-size="20" font-weight="700" letter-spacing="3">PROGRAMMATIC LOCAL SEO</text>
  <text x="80" y="266" fill="#3A2411" font-size="46" font-weight="700">Thousands of local</text>
  <text x="80" y="320" fill="#3A2411" font-size="46" font-weight="700">SEO pages, built</text>
  <text x="80" y="374" fill="#3A2411" font-size="46" font-weight="700">in minutes</text>
  <text x="80" y="424" fill="#5A4530" font-size="21">City &#215; keyword landing pages across</text>
  <text x="80" y="454" fill="#5A4530" font-size="21">every Indian state &#8212; generated from</text>
  <text x="80" y="484" fill="#5A4530" font-size="21">a single template, fully automated.</text>

  <!-- stat chips -->
  <g>
    <rect x="80" y="524" width="176" height="60" rx="14" fill="#fff" stroke="#F6D8C1"/>
    <text x="98" y="549" fill="#A98A6E" font-size="12" font-weight="600">PAGES GENERATED</text>
    <text x="98" y="574" fill="#EA580C" font-size="22" font-weight="800">18,600+</text>
    <rect x="268" y="524" width="150" height="60" rx="14" fill="#fff" stroke="#F6D8C1"/>
    <text x="286" y="549" fill="#A98A6E" font-size="12" font-weight="600">KEYWORDS</text>
    <text x="286" y="574" fill="#EA580C" font-size="22" font-weight="800">85</text>
    <rect x="430" y="524" width="150" height="60" rx="14" fill="#fff" stroke="#F6D8C1"/>
    <text x="448" y="549" fill="#A98A6E" font-size="12" font-weight="600">STATES</text>
    <text x="448" y="574" fill="#EA580C" font-size="22" font-weight="800">28+</text>
  </g>

  <!-- browser window -->
  <g filter="url(#shadow)">
    <rect x="646" y="110" width="486" height="530" rx="22" fill="#ffffff"/>
  </g>
  <g clip-path="url(#win)">
    <!-- browser bar -->
    <rect x="646" y="110" width="486" height="64" fill="#F5F1EC"/>
    <circle cx="678" cy="142" r="6" fill="#E9857A"/>
    <circle cx="700" cy="142" r="6" fill="#EFC15A"/>
    <circle cx="722" cy="142" r="6" fill="#8FD08A"/>
    <rect x="748" y="124" width="360" height="36" rx="18" fill="#fff" stroke="#E6DED4"/>
    <text x="772" y="147" fill="#7A6B58" font-size="15">instagram followers in mumbai</text>
    <circle cx="1084" cy="142" r="9" fill="none" stroke="#B8A891" stroke-width="3"/>
    <line x1="1091" y1="149" x2="1100" y2="158" stroke="#B8A891" stroke-width="3"/>

    <!-- rank #1 result -->
    <rect x="672" y="196" width="434" height="108" rx="14" fill="#FFF7F0" stroke="#F7C9A6"/>
    <rect x="690" y="214" width="70" height="26" rx="13" fill="url(#acc)"/>
    <text x="725" y="232" fill="#fff" font-size="13" font-weight="800" text-anchor="middle">RANK #1</text>
    <text x="690" y="270" fill="#1A5CC0" font-size="18" font-weight="700">Buy Instagram Followers in Mumbai</text>
    <text x="690" y="292" fill="#3F8A55" font-size="13">pramitseo.in &#8250; maharashtra &#8250; instagram-followers-mumbai</text>

    <!-- result 2 -->
