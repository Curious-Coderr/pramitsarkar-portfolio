<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="'Inter Tight','Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F7F3"/>
      <stop offset="1" stop-color="#E4F3EA"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#141412" flood-opacity="0.18"/>
    </filter>
    <clipPath id="screenClip"><rect x="736" y="86" width="368" height="578" rx="30"/></clipPath>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Left content -->
  <text x="80" y="230" fill="#128C7E" font-size="20" font-weight="700" letter-spacing="3">WHATSAPP AI CHATBOT</text>
  <text x="80" y="292" fill="#141412" font-size="44" font-weight="700">A 24/7 restaurant</text>
  <text x="80" y="344" fill="#141412" font-size="44" font-weight="700">assistant on WhatsApp</text>
  <text x="80" y="392" fill="#45443F" font-size="21">Answers menu questions, books tables and</text>
  <text x="80" y="422" fill="#45443F" font-size="21">captures orders &#8212; instantly, day and night.</text>

  <!-- Feature chips -->
  <g font-size="17" font-weight="600" fill="#0B3D34">
    <g>
      <rect x="80" y="470" width="176" height="46" rx="23" fill="#FFFFFF" stroke="#CDE7D8"/>
      <circle cx="106" cy="493" r="6" fill="#25D366"/>
      <text x="122" y="499">Menu Q&amp;A</text>
    </g>
    <g>
      <rect x="272" y="470" width="230" height="46" rx="23" fill="#FFFFFF" stroke="#CDE7D8"/>
      <circle cx="298" cy="493" r="6" fill="#25D366"/>
      <text x="314" y="499">Table reservations</text>
    </g>
    <g>
      <rect x="80" y="530" width="196" height="46" rx="23" fill="#FFFFFF" stroke="#CDE7D8"/>
      <circle cx="106" cy="553" r="6" fill="#25D366"/>
      <text x="122" y="559">Order capture</text>
    </g>
    <g>
      <rect x="292" y="530" width="210" height="46" rx="23" fill="#FFFFFF" stroke="#CDE7D8"/>
      <circle cx="318" cy="553" r="6" fill="#25D366"/>
      <text x="334" y="559">Instant replies</text>
    </g>
  </g>

  <!-- Phone -->
  <rect x="720" y="70" width="400" height="610" rx="46" fill="#0F1418" filter="url(#shadow)"/>
  <g clip-path="url(#screenClip)">
    <rect x="736" y="86" width="368" height="578" fill="#ECE5DD"/>

    <!-- Header -->
    <rect x="736" y="86" width="368" height="80" fill="#075E54"/>
    <circle cx="792" cy="126" r="24" fill="#25D366"/>
    <!-- bot glyph -->
    <g transform="translate(792,126)" fill="#FFFFFF">
      <rect x="-13" y="-9" width="26" height="20" rx="6"/>
      <line x1="0" y1="-9" x2="0" y2="-17" stroke="#FFFFFF" stroke-width="2.5"/>
      <circle cx="0" cy="-19" r="3"/>
    </g>
    <circle cx="787" cy="123" r="2.6" fill="#075E54"/>
    <circle cx="797" cy="123" r="2.6" fill="#075E54"/>
    <text x="830" y="120" fill="#FFFFFF" font-size="19" font-weight="600">Flavours Assistant</text>
    <text x="830" y="143" fill="#B9E6D9" font-size="13">online</text>

    <!-- Bot bubble 1 -->
    <rect x="756" y="192" width="256" height="78" rx="14" fill="#FFFFFF"/>
    <text x="774" y="223" fill="#141412" font-size="17">Welcome to Flavours of</text>
    <text x="774" y="248" fill="#141412" font-size="17">Ranaghat! How can I help?</text>
    <text x="990" y="262" fill="#9C9B91" font-size="12" text-anchor="end">6:41 PM</text>

    <!-- User bubble -->
    <rect x="828" y="288" width="200" height="54" rx="14" fill="#DCF8C6"/>
    <text x="848" y="320" fill="#141412" font-size="17">Table for 4 at 8 PM?</text>
    <text x="1010" y="335" fill="#5E7A63" font-size="12" text-anchor="end">6:41 PM</text>

    <!-- Bot bubble 2 -->
    <rect x="756" y="360" width="278" height="78" rx="14" fill="#FFFFFF"/>
    <text x="774" y="391" fill="#141412" font-size="17">Booked! Table for 4 at</text>
    <text x="774" y="416" fill="#141412" font-size="17">8:00 PM. See you tonight.</text>
    <text x="1012" y="430" fill="#9C9B91" font-size="12" text-anchor="end">6:42 PM</text>

    <!-- Quick replies -->
    <g font-size="15" font-weight="600" fill="#075E54">
      <rect x="756" y="458" width="120" height="40" rx="20" fill="#FFFFFF" stroke="#25D366"/>
      <text x="816" y="483" text-anchor="middle">See menu</text>
      <rect x="888" y="458" width="132" height="40" rx="20" fill="#FFFFFF" stroke="#25D366"/>
      <text x="954" y="483" text-anchor="middle">Directions</text>
    </g>

    <!-- Input bar -->
    <rect x="748" y="606" width="300" height="46" rx="23" fill="#FFFFFF"/>
    <text x="774" y="635" fill="#9C9B91" font-size="16">Type a message</text>
    <circle cx="1076" cy="629" r="22" fill="#25D366"/>
    <path d="M1068,629 L1084,629 M1078,623 L1084,629 L1078,635" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
